<!DOCTYPE html>
<html lang="hu">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <?!= include('styles'); ?>
</head>
<body>
  <div class="container">
    
    <!-- FEJLÉC -->
    <header class="paykal-header">
      <h1>PayKal</h1>
    </header>

    <!-- DASHBOARD KÉPERNYŐ -->
    <main id="dashboardView" class="screen">
      <div class="card balance-card">
        <span class="balance-label">Összesített Egyenleg</span>
        <div id="totalBalance" class="total-balance-amount">0 Ft</div>
        
        <div class="balance-grid">
          <div class="balance-box">
            <span class="sub-label">Készpénz</span>
            <span id="cashBalance" class="sub-amount">0 Ft</span>
          </div>
          <div class="balance-box">
            <span class="sub-label">Bankszámla</span>
            <span id="bankBalance" class="sub-amount">0 Ft</span>
          </div>
        </div>
      </div>

      <div class="action-buttons-grid">
        <button type="button" class="action-btn btn-income" onclick="showScreen('incomeScreen')">+ Új Bevétel</button>
        <button type="button" class="action-btn btn-expense" onclick="showScreen('expenseScreen')">- Új Kiadás</button>
      </div>
      <button type="button" class="action-btn btn-transfer" onclick="showScreen('transferScreen')">⇄ Átvezetés</button>
    </main>

    <!-- KIADÁS RÖGZÍTÉSE KÉPERNYŐ -->
    <section id="expenseScreen" class="screen hidden">
      <button type="button" id="backToDashBtn" class="btn-back">← Vissza</button>
      <div class="card">
        <h2>Új Kiadás Rögzítése</h2>
        <form id="expenseForm" onsubmit="return false;">
          
          <div class="form-group">
            <label for="date">Dátum *</label>
            <input type="date" id="date" required>
          </div>

          <div class="form-group">
            <label for="costCenter">Költséghely *</label>
            <select id="costCenter" required>
              <option value="" disabled selected>Betöltés...</option>
            </select>
          </div>

          <div class="form-group">
            <label for="paymentMethod">Fizetési mód *</label>
            <select id="paymentMethod" required>
              <option value="" disabled selected>Betöltés...</option>
            </select>
          </div>

          <div class="form-group">
            <label for="amount">Összeg (Ft) *</label>
            <input type="number" id="amount" placeholder="0" min="1" required>
          </div>

          <div class="form-group">
            <label for="description">Megjegyzés / Leírás</label>
            <textarea id="description" rows="3" placeholder="Részletek..."></textarea>
          </div>

          <button type="submit" class="action-btn btn-expense" style="width:100%; margin-top:16px;">Kiadás Mentése</button>
        </form>
      </div>
    </section>

    <!-- BEVÉTEL RÖGZÍTÉSE KÉPERNYŐ -->
    <section id="incomeScreen" class="screen hidden">
      <button type="button" id="backToDashFromIncomeBtn" class="btn-back">← Vissza</button>
      <div class="card">
        <h2>Új Bevétel Rögzítése</h2>
        <form id="incomeForm" onsubmit="return false;">
          
          <div class="form-group">
            <label for="incomeDate">Dátum *</label>
            <input type="date" id="incomeDate" required>
          </div>

          <div class="form-group">
            <label for="incomePurpose">Befizetés célja *</label>
            <select id="incomePurpose" required>
              <option value="" disabled selected>Betöltés...</option>
            </select>
          </div>

          <div class="form-group">
            <label for="incomePaymentMethod">Befizetés módja *</label>
            <select id="incomePaymentMethod" required>
              <option value="" disabled selected>Betöltés...</option>
            </select>
          </div>

          <div class="form-group">
            <label>Befizető(k) kiválasztása *</label>
            <div class="custom-select-wrapper">
              <div id="payerSelectTrigger" class="custom-select-trigger">
                <span id="payerSelectText">Válassz befizető(k)et...</span>
                <span>▼</span>
              </div>
              <div id="payersDropdownPanel" class="dropdown-panel hidden">
                <div id="payersCheckboxList">
                  <!-- JS tölti fel a táblázat alapján -->
                </div>
                <div class="checkbox-item border-top">
                  <label for="cb_other_payer" style="margin:0; font-weight:normal; cursor:pointer;">
                    <input type="checkbox" id="cb_other_payer"> Egyéb / Új személy
                  </label>
                </div>
              </div>
            </div>
          </div>

          <div id="customPayerContainer" class="form-group hidden">
            <label for="customPayerName">Egyéb befizető neve</label>
            <input type="text" id="customPayerName" placeholder="Név megadása...">
          </div>

          <div class="form-group">
            <label for="incomeAmount">Összeg (Ft) *</label>
            <input type="number" id="incomeAmount" placeholder="0" min="1" required>
          </div>

          <div class="form-group">
            <label for="incomeDescription">Megjegyzés</label>
            <textarea id="incomeDescription" rows="3" placeholder="Részletek..."></textarea>
          </div>

          <button type="submit" class="action-btn btn-income" style="width:100%; margin-top:16px;">Bevétel Mentése</button>
        </form>
      </div>
    </section>

    <!-- ÁTVEZETÉS KÉPERNYŐ -->
    <section id="transferScreen" class="screen hidden">
      <button type="button" id="backToDashFromTransferBtn" class="btn-back">← Vissza</button>
      <div class="card">
        <h2>Átvezetés Számlák Között</h2>
        <form id="transferForm" onsubmit="return false;">
          
          <div class="form-group">
            <label for="transferDate">Dátum *</label>
            <input type="date" id="transferDate" required>
          </div>

          <div class="form-group">
            <label for="transferFrom">Honnan *</label>
            <select id="transferFrom" required>
              <option value="Készpénz">Készpénz</option>
              <option value="Bankszámla">Bankszámla</option>
            </select>
          </div>

          <div class="form-group">
            <label for="transferTo">Hova *</label>
            <select id="transferTo" required>
              <option value="Bankszámla">Bankszámla</option>
              <option value="Készpénz">Készpénz</option>
            </select>
          </div>

          <div class="form-group">
            <label for="transferAmount">Összeg (Ft) *</label>
            <input type="number" id="transferAmount" placeholder="0" min="1" required>
          </div>

          <button type="submit" class="action-btn btn-transfer" style="width:100%; margin-top:16px;">Átvezetés Indítása</button>
        </form>
      </div>
    </section>

  </div>

  <?!= include('javascript'); ?>
</body>
</html>
