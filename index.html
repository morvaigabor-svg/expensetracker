<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PayKal Tracker</title>

  <!-- External Chart.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- CSS Stílusok Beemelése -->
  <?!= include('styles'); ?>
</head>
<body>

  <div class="app-container">

    <!-- ===================================================================
         1. DASHBOARD VIEW (FŐKÉPERNYŐ)
         =================================================================== -->
    <div id="dashboardView">
      <div class="dash-header">
        <h1>PayKal Pénzügyek</h1>
      </div>

      <!-- Összesített Egyenleg Kártya -->
      <div class="balance-card">
        <div class="balance-title">Összesített Egyenleg</div>
        <div id="totalBalanceDisplay" class="balance-amount">0 Ft</div>

        <!-- Megoszlási Sáv -->
        <div class="balance-bar-container">
          <div id="cashBar" class="bar-cash" style="width: 50%;"></div>
          <div id="bankBar" class="bar-bank" style="width: 50%;"></div>
        </div>

        <div class="balance-details">
          <div class="balance-detail-item">
            <span>💵 Készpénz</span>
            <strong id="cashBalanceDisplay">0 Ft</strong>
          </div>
          <div class="balance-detail-item" style="text-align: right;">
            <span>💳 Számla / Bank</span>
            <strong id="bankBalanceDisplay">0 Ft</strong>
          </div>
        </div>
      </div>

      <!-- Diagram Kártya Időszak Szűrővel -->
      <div class="card">
        <div class="time-filter-container">
          <button type="button" class="time-btn active" onclick="changeTimeFilter('1H')">1H</button>
          <button type="button" class="time-btn" onclick="changeTimeFilter('3H')">3H</button>
          <button type="button" class="time-btn" onclick="changeTimeFilter('6H')">6H</button>
          <button type="button" class="time-btn" onclick="changeTimeFilter('1E')">1É</button>
          <button type="button" class="time-btn" onclick="changeTimeFilter('2E')">2É</button>
          <button type="button" class="time-btn" onclick="changeTimeFilter('O')">Ö</button>
        </div>

        <div class="chart-container">
          <canvas id="expenseChart"></canvas>
        </div>
      </div>

      <!-- Gyorsakció Gombok -->
      <div class="action-buttons">
        <button type="button" class="btn btn-primary" onclick="showScreen('expenseScreen')">
          ➕ Új Kiadás
        </button>
        <button type="button" class="btn btn-success" onclick="showScreen('incomeScreen')">
          💰 Új Bevétel
        </button>
        <button type="button" class="btn btn-secondary btn-full" onclick="showScreen('transferScreen')">
          🔄 Pénzmozgás (Kp / Számla)
        </button>
      </div>
    </div>


    <!-- ===================================================================
         2. KIADÁS RÖGZÍTÉS KÉPERNYŐ
         =================================================================== -->
    <div id="expenseScreen" class="card hidden">
      <div class="screen-header">
        <button type="button" id="backToDashBtn" class="btn-back">⬅️</button>
        <h2 class="screen-title">Új Kiadás Rögzítése</h2>
        <div style="width: 24px;"></div>
      </div>

      <form id="expenseForm" onsubmit="return false;">
        <div class="form-group">
          <label for="date">Dátum</label>
          <input type="date" id="date" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="amount">Összeg (Ft)</label>
          <input type="number" id="amount" class="form-control" placeholder="0" inputmode="numeric" required>
        </div>

        <div class="form-group">
          <label for="costCenter">Költséghely</label>
          <select id="costCenter" class="form-control" required>
            <option value="" disabled selected>Betöltés...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="paymentMethod">Fizetési Mód</label>
          <select id="paymentMethod" class="form-control" required>
            <option value="" disabled selected>Betöltés...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="comment">Megjegyzés</label>
          <textarea id="comment" class="form-control" placeholder="Opcionális megjegyzés..."></textarea>
        </div>

        <!-- Blokk Csatolási Opciók -->
        <div class="form-group" style="display: flex; gap: 8px;">
          <label class="btn btn-outline" style="flex: 1; margin: 0; text-align: center; cursor: pointer;">
            📷 Fotó Készítése
            <input type="file" id="receipt" accept="image/*" capture="environment" class="hidden">
          </label>
          <label class="btn btn-outline" style="flex: 1; margin: 0; text-align: center; cursor: pointer;">
            📁 Fájl Tallózása
            <input type="file" id="receiptFile" accept="image/*" multiple class="hidden">
          </label>
        </div>

        <button type="button" id="saveButton" class="btn btn-primary" style="margin-top: 20px;">
          Mentés és Ellenőrzés
        </button>
      </form>
    </div>


    <!-- ===================================================================
         3. BEVÉTEL RÖGZÍTÉS KÉPERNYŐ
         =================================================================== -->
    <div id="incomeScreen" class="card hidden">
      <div class="screen-header">
        <button type="button" id="backToDashFromIncomeBtn" class="btn-back">⬅️</button>
        <h2 class="screen-title">Új Bevétel Rögzítése</h2>
        <div style="width: 24px;"></div>
      </div>

      <form id="incomeForm" onsubmit="return false;">
        <div class="form-group">
          <label for="incomeDate">Dátum</label>
          <input type="date" id="incomeDate" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="incomeAmount">Összeg / Fő (Ft)</label>
          <input type="number" id="incomeAmount" class="form-control" placeholder="0" inputmode="numeric" required>
        </div>

        <div class="form-group">
          <label for="incomePurpose">Befizetés Célja</label>
          <select id="incomePurpose" class="form-control" required>
            <option value="" disabled selected>Betöltés...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="incomePaymentMethod">Befizetés Módja</label>
          <select id="incomePaymentMethod" class="form-control" required>
            <option value="" disabled selected>Betöltés...</option>
          </select>
        </div>

        <!-- Befizetők Lenyíló Checkbox Panel -->
        <div class="form-group">
          <label>Befizető(k) Kijelölése</label>
          <button type="button" id="payerSelectTrigger" class="custom-select-trigger">
            <span id="payerSelectText">Válassz befizető(k)et...</span>
            <span>▼</span>
          </button>

          <div id="payersDropdownPanel" class="dropdown-panel hidden">
            <div id="payersCheckboxList" class="checkbox-list">
              <!-- JS Tölti fel dynamikusan -->
            </div>
            
            <hr style="margin: 8px 0; border: none; border-top: 1px solid var(--border-color);">
            
            <label class="checkbox-item">
              <input type="checkbox" id="cb_other_payer">
              <strong>Egyéb személy...</strong>
            </label>

            <div id="customPayerContainer" class="hidden" style="margin-top: 8px;">
              <input type="text" id="customPayerInput" class="form-control" placeholder="Név megadása...">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="incomeComment">Megjegyzés</label>
          <textarea id="incomeComment" class="form-control" placeholder="Opcionális megjegyzés..."></textarea>
        </div>

        <button type="button" id="saveIncomeBtn" class="btn btn-success" style="margin-top: 20px;">
          Bevétel Rögzítése
        </button>
      </form>
    </div>


    <!-- ===================================================================
         4. PÉNZMOZGÁS (ÁTVEZETÉS) KÉPERNYŐ
         =================================================================== -->
    <div id="transferScreen" class="card hidden">
      <div class="screen-header">
        <button type="button" id="backToDashFromTransferBtn" class="btn-back">⬅️</button>
        <h2 class="screen-title">Pénzmozgás Rögzítése</h2>
        <div style="width: 24px;"></div>
      </div>

      <form id="transferForm" onsubmit="return false;">
        <div class="form-group">
          <label for="transferDate">Dátum</label>
          <input type="date" id="transferDate" class="form-control" required>
        </div>

        <div class="form-group">
          <label for="transferType">Tranzakció Típusa</label>
          <select id="transferType" class="form-control" required>
            <option value="Készpénz -> Számla (Befizetés)">Készpénz ➡️ Számla (Befizetés)</option>
            <option value="Számla -> Készpénz (Készpénzfelvétel)">Számla ➡️ Készpénz (Készpénzfelvétel)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="transferAmount">Összeg (Ft)</label>
          <input type="number" id="transferAmount" class="form-control" placeholder="0" inputmode="numeric" required>
        </div>

        <div class="form-group">
          <label for="transferComment">Megjegyzés</label>
          <textarea id="transferComment" class="form-control" placeholder="Opcionális megjegyzés..."></textarea>
        </div>

        <button type="button" id="saveTransferBtn" class="btn btn-primary" style="margin-top: 20px;">
          Tranzakció Mentése
        </button>
      </form>
    </div>

  </div>

  <!-- Dialog / Modal Ablakok Beemelése -->
  <?!= include('dialogs'); ?>

  <!-- Frontend JavaScript Logika Beemelése -->
  <?!= include('javascript'); ?>

</body>
</html>
