<script>
let selectedReceipts = [];
let chartInstance = null;
let currentPeriod = "havi";
let currentIncomeData = null;

document.addEventListener("DOMContentLoaded", function() {

  /* 1. Kezdő adatok és Dashboard betöltése */
  loadDashboardData("havi");
  loadSettings();

  /* 2. Automatikus mai dátumok beállítása */
  try {
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, "0");
    const day = String(today.getDate()).padStart(2, "0");
    const formattedDate = year + "-" + month + "-" + day;

    if (document.getElementById("date")) document.getElementById("date").value = formattedDate;
    if (document.getElementById("incomeDate")) document.getElementById("incomeDate").value = formattedDate;
    if (document.getElementById("transferDate")) document.getElementById("transferDate").value = formattedDate;
  } catch (e) {
    console.error(e);
  }

  /* 3. Képernyőváltó gombok */
  document.getElementById("addExpenseBtn")?.addEventListener("click", () => showScreen("expenseScreen"));
  document.getElementById("addIncomeBtn")?.addEventListener("click", () => showScreen("incomeScreen"));
  document.getElementById("addTransferBtn")?.addEventListener("click", () => showScreen("transferScreen"));

  document.getElementById("backToDashBtn")?.addEventListener("click", () => { showScreen("dashboardScreen"); loadDashboardData(currentPeriod); });
  document.getElementById("backToDashFromIncomeBtn")?.addEventListener("click", () => { showScreen("dashboardScreen"); loadDashboardData(currentPeriod); });
  document.getElementById("backToDashFromTransferBtn")?.addEventListener("click", () => { showScreen("dashboardScreen"); loadDashboardData(currentPeriod); });

  /* 4. Időszak szűrő gombok */
  const filterBtns = document.querySelectorAll(".filter-btn");
  filterBtns.forEach(function(btn) {
    btn.addEventListener("click", function() {
      filterBtns.forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      currentPeriod = this.getAttribute("data-period");
      loadDashboardData(currentPeriod);
    });
  });

  /* 5. Befizető Lenyíló Panel Nyitás / Zárás */
  document.getElementById("payerSelectTrigger")?.addEventListener("click", function() {
    document.getElementById("payersDropdownPanel")?.classList.toggle("hidden");
  });

  document.getElementById("cb_other_payer")?.addEventListener("change", function() {
    const container = document.getElementById("customPayerContainer");
    if (this.checked) {
      container.classList.remove("hidden");
      document.getElementById("customPayerInput").focus();
    } else {
      container.classList.add("hidden");
    }
    updatePayerBadge();
  });

  /* 6. Kiadás Mentés gomb */
  document.getElementById("saveButton")?.addEventListener("click", function() {
    const amount = document.getElementById("amount").value;
    const date = document.getElementById("date").value;
    const costCenter = document.getElementById("costCenter").value;
    const paymentMethod = document.getElementById("paymentMethod").value;
    const comment = document.getElementById("comment").value;

    if (!date) { alert("⚠️ Kérlek add meg a dátumot!"); return; }
    if (!amount || Number(amount) <= 0) { alert("⚠️ Kérlek adj meg egy érvényes összeget!"); return; }
    if (!costCenter) { alert("⚠️ Kérlek válassz költséghelyet!"); return; }
    if (!paymentMethod) { alert("⚠️ Kérlek válassz fizetési módot!"); return; }

    const expense = { date, amount: Number(amount), costCenter, paymentMethod, comment };
    window.currentExpense = expense;

    if (selectedReceipts.length === 0) {
      document.getElementById("noReceiptDialog").classList.remove("hidden");
    } else {
      showSummary(expense);
    }
  });

  /* 7. Bevétel Mentés gomb */
  document.getElementById("saveIncomeBtn")?.addEventListener("click", function() {
    const date = document.getElementById("incomeDate").value;
    const amount = document.getElementById("incomeAmount").value;
    const purpose = document.getElementById("incomePurpose").value;
    const paymentMethod = document.getElementById("incomePaymentMethod").value;
    const comment = document.getElementById("incomeComment").value;

    if (!date) { alert("⚠️ Kérlek add meg a dátumot!"); return; }
    if (!amount || Number(amount) <= 0) { alert("⚠️ Kérlek adj meg egy érvényes összeget!"); return; }
    if (!purpose) { alert("⚠️ Kérlek válassz befizetés célt!"); return; }
    if (!paymentMethod) { alert("⚠️ Kérlek válassz befizetési módot!"); return; }

    const checkedPayers = [];
    document.querySelectorAll("#payersCheckboxList input[type='checkbox']:checked").forEach(cb => checkedPayers.push(cb.value));

    const otherCb = document.getElementById("cb_other_payer");
    if (otherCb && otherCb.checked) {
      const customName = document.getElementById("customPayerInput").value.trim();
      if (!customName) { alert("⚠️ Kérlek add meg az 'Egyéb' befizető nevét!"); return; }
      checkedPayers.push(customName);
    }

    if (checkedPayers.length === 0) {
      alert("⚠️ Kérlek válassz ki legalább egy befizetőt!");
      return;
    }

    currentIncomeData = { date, amount: Number(amount), purpose, paymentMethod, payers: checkedPayers, comment };
    document.getElementById("payersDropdownPanel")?.classList.add("hidden");

    showIncomeSummary(currentIncomeData);
  });

  /* 8. Pénzmozgás Mentése */
  document.getElementById("saveTransferBtn")?.addEventListener("click", function() {
    const date = document.getElementById("transferDate").value;
    const type = document.getElementById("transferType").value;
    const amount = document.getElementById("transferAmount").value;
    const comment = document.getElementById("transferComment").value;

    if (!date) { alert("⚠️ Kérlek add meg a dátumot!"); return; }
    if (!amount || Number(amount) <= 0) { alert("⚠️ Kérlek adj meg egy érvényes összeget!"); return; }

    const transferData = { date, type, amount: Number(amount), comment };

    const saveBtn = document.getElementById("saveTransferBtn");
    saveBtn.disabled = true;
    saveBtn.textContent = "⏳ Mentés...";

    google.script.run
      .withSuccessHandler(function(res) {
        alert("✅ " + res.message);
        saveBtn.disabled = false;
        saveBtn.textContent = "Mentés";
        resetTransferForm();
        showScreen("dashboardScreen");
        loadDashboardData(currentPeriod);
      })
      .withFailureHandler(function(err) {
        alert("⚠ Hiba: " + err);
        saveBtn.disabled = false;
        saveBtn.textContent = "Mentés";
      })
      .saveTransfer(transferData);
  });

  /* Modal gombok */
  document.getElementById("cancelIncomeButton")?.addEventListener("click", () => document.getElementById("incomeConfirmDialog").classList.add("hidden"));

  document.getElementById("confirmIncomeButton")?.addEventListener("click", function() {
    if (!currentIncomeData) return;

    const confirmBtn = document.getElementById("confirmIncomeButton");
    confirmBtn.disabled = true;

    google.script.run
      .withSuccessHandler(function(res) {
        alert("✅ " + res.message);
        document.getElementById("incomeConfirmDialog").classList.add("hidden");
        confirmBtn.disabled = false;
        resetIncomeForm();
        showScreen("dashboardScreen");
        loadDashboardData(currentPeriod);
      })
      .withFailureHandler(function(err) {
        alert("⚠ Hiba: " + err);
        confirmBtn.disabled = false;
      })
      .saveIncome(currentIncomeData);
  });

});

/* --- GLOBÁLIS FÜGGVÉNYEK --- */

function showScreen(screenId) {
  document.getElementById("dashboardScreen").classList.add("hidden");
  document.getElementById("expenseScreen").classList.add("hidden");
  document.getElementById("incomeScreen").classList.add("hidden");
  document.getElementById("transferScreen").classList.add("hidden");
  document.getElementById(screenId).classList.remove("hidden");
}

function loadDashboardData(period) {
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) return;
      document.getElementById("totalAmountText").textContent = data.totalAmount.toLocaleString("hu-HU") + " Ft";
      renderChart(data.labels, data.values);
    })
    .getDashboardStats(period);
}

function renderChart(labels, values) {
  const ctx = document.getElementById("expenseChart").getContext("2d");
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{ label: "Költés (Ft)", data: values, backgroundColor: "#1976d2", borderRadius: 8 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 16 } } },
        y: { beginAtZero: true, ticks: { font: { size: 16 }, callback: v => v.toLocaleString("hu-HU") + " Ft" } }
      }
    }
  });
}

function loadSettings() {
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) return;
      
      // Költséghelyek (A)
      fillSelect("costCenter", data.costCenters, "Válassz költséghelyet");
      // Fizetési módok - Kiadások (B)
      fillSelect("paymentMethod", data.paymentMethods, "Válassz fizetési módot");
      // Befizetés módjai (C)
      fillSelect("incomePaymentMethod", data.incomePaymentMethods, "Válassz módot (Pl. Készpénz / Utalás)");
      // Befizetés célja (F)
      fillSelect("incomePurpose", data.incomePurposes, "Válassz célt");

      // Befizetők (E)
      const payersList = document.getElementById("payersCheckboxList");
      if (payersList && data.payers) {
        payersList.innerHTML = "";
        data.payers.forEach(function(payer, index) {
          const label = document.createElement("label");
          label.className = "checkbox-item";
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.value = payer;
          cb.addEventListener("change", updatePayerBadge);
          label.appendChild(cb);
          label.appendChild(document.createTextNode(payer));
          payersList.appendChild(label);
        });
      }
    })
    .getSettings();
}

function fillSelect(elementId, items, placeholder) {
  const select = document.getElementById(elementId);
  if (select && items) {
    select.innerHTML = '<option value="" disabled selected>' + placeholder + '</option>';
    items.forEach(item => {
      const option = document.createElement("option");
      option.value = item;
      option.textContent = item;
      select.appendChild(option);
    });
  }
}

function updatePayerBadge() {
  const checkedCount = document.querySelectorAll("#payersCheckboxList input[type='checkbox']:checked").length;
  const otherCb = document.getElementById("cb_other_payer");
  const isOther = otherCb && otherCb.checked ? 1 : 0;
  const total = checkedCount + isOther;

  const triggerText = document.getElementById("payerSelectText");
  if (triggerText) {
    triggerText.textContent = total === 0 ? "Válassz befizető(k)et..." : "Kijelölve: " + total + " fő";
  }
}

function showIncomeSummary(income) {
  const totalSum = income.amount * income.payers.length;
  document.getElementById("incomeSummary").innerHTML = 
    "<p><strong>Dátum:</strong> " + income.date + "</p>" +
    "<p><strong>Összeg / fő:</strong> " + income.amount.toLocaleString("hu-HU") + " Ft</p>" +
    "<p><strong>Befizetés célja:</strong> " + income.purpose + "</p>" +
    "<p><strong>Befizetés módja:</strong> " + income.paymentMethod + "</p>" +
    "<p><strong>Kijelölt befizetők (" + income.payers.length + " fő):</strong><br><i>" + income.payers.join(", ") + "</i></p>" +
    "<p style='font-size: 18px; color: #2e7d32; margin-top: 10px;'><strong>Összesen rögzítve: " + totalSum.toLocaleString("hu-HU") + " Ft</strong></p>";

  document.getElementById("incomeConfirmDialog").classList.remove("hidden");
}

function resetIncomeForm() {
  document.getElementById("incomeAmount").value = "";
  document.getElementById("incomeComment").value = "";
  if (document.getElementById("incomePurpose")) document.getElementById("incomePurpose").selectedIndex = 0;
  if (document.getElementById("incomePaymentMethod")) document.getElementById("incomePaymentMethod").selectedIndex = 0;
  document.querySelectorAll("#payersCheckboxList input[type='checkbox']").forEach(cb => cb.checked = false);
  if (document.getElementById("cb_other_payer")) document.getElementById("cb_other_payer").checked = false;
  if (document.getElementById("customPayerInput")) document.getElementById("customPayerInput").value = "";
  document.getElementById("customPayerContainer")?.classList.add("hidden");
  document.getElementById("payersDropdownPanel")?.classList.add("hidden");
  updatePayerBadge();
}

function resetTransferForm() {
  document.getElementById("transferAmount").value = "";
  document.getElementById("transferComment").value = "";
  if (document.getElementById("transferType")) document.getElementById("transferType").selectedIndex = 0;
}
</script>
