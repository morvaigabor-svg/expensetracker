<script>
let selectedReceipts = [];
let paykalChart = null;
let currentPeriod = "1H";
let currentIncomeData = null;

document.addEventListener("DOMContentLoaded", function() {

  /* 1. Dashboard és Beállítások betöltése */
  loadPayKalDashboard(currentPeriod);
  loadSettings();

  /* 2. Automatikus mai dátumok beállítása */
  try {
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, "0");
    const day = String(today.getDate()).padStart(2, "0");
    const formattedDate = `${year}-${month}-${day}`;

    if (document.getElementById("date")) document.getElementById("date").value = formattedDate;
    if (document.getElementById("incomeDate")) document.getElementById("incomeDate").value = formattedDate;
    if (document.getElementById("transferDate")) document.getElementById("transferDate").value = formattedDate;
  } catch (e) {
    console.error(e);
  }

  /* 3. Vissza gombok a Dashboardra */
  document.getElementById("backToDashBtn")?.addEventListener("click", () => { showScreen("dashboardView"); loadPayKalDashboard(currentPeriod); });
  document.getElementById("backToDashFromIncomeBtn")?.addEventListener("click", () => { showScreen("dashboardView"); loadPayKalDashboard(currentPeriod); });
  document.getElementById("backToDashFromTransferBtn")?.addEventListener("click", () => { showScreen("dashboardView"); loadPayKalDashboard(currentPeriod); });

  /* 4. Befizető Lenyíló Panel */
  document.getElementById("payerSelectTrigger")?.addEventListener("click", function() {
    document.getElementById("payersDropdownPanel")?.classList.toggle("hidden");
  });

  document.getElementById("cb_other_payer")?.addEventListener("change", function() {
    const container = document.getElementById("customPayerContainer");
    if (this.checked) {
      container.classList.remove("hidden");
      document.getElementById("customPayerInput")?.focus();
    } else {
      container.classList.add("hidden");
    }
    updatePayerBadge();
  });

  /* 5. Blokk / Kép feltöltés eseménykezelők */
  document.getElementById("receipt")?.addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const fileName = file.name || ("blokk_" + (selectedReceipts.length + 1) + ".jpg");

    const reader = new FileReader();
    reader.onload = function(evt) {
      selectedReceipts.push({
        data: evt.target.result,
        name: fileName
      });
      renderReceiptPreviews();
      document.getElementById("receiptDialog")?.classList.remove("hidden");
    };
    reader.readAsDataURL(file);
  });

  document.getElementById("moreReceiptButton")?.addEventListener("click", function() {
    document.getElementById("receiptDialog")?.classList.add("hidden");
    const receiptInput = document.getElementById("receipt");
    if (receiptInput) receiptInput.value = "";
    receiptInput?.click();
  });

  document.getElementById("finishReceiptButton")?.addEventListener("click", function() {
    document.getElementById("receiptDialog")?.classList.add("hidden");
  });

  /* 6. Kiadás Mentés gomb */
  document.getElementById("saveButton")?.addEventListener("click", function() {
    const amount = document.getElementById("amount").value;
    const date = document.getElementById("date").value;
    const costCenter = document.getElementById("costCenter").value;
    const paymentMethod = document.getElementById("paymentMethod").value;
    const comment = document.getElementById("comment").value;

    if (!date) { alert("⚠️ Kérlek add meg a dátumot!"); return; }
    if (!amount || Number(amount) <= 0) { alert("⚠️ Kérlek adj meg egy érvényes összeget!"); return; }
    if (!costCenter) { alert("⚠️ Kérlek válassz költséghelyet!"); return; }
    if (!paymentMethod) { alert("⚠️ Kérlek válassz fizetési módot!"); return; }

    const expense = { date, amount: Number(amount), costCenter, paymentMethod, comment };
    window.currentExpense = expense;

    if (selectedReceipts.length === 0) {
      document.getElementById("noReceiptDialog")?.classList.remove("hidden");
    } else {
      showSummary(expense);
    }
  });

  document.getElementById("noReceiptBackButton")?.addEventListener("click", function() {
    document.getElementById("noReceiptDialog")?.classList.add("hidden");
  });

  document.getElementById("noReceiptContinueButton")?.addEventListener("click", function() {
    document.getElementById("noReceiptDialog")?.classList.add("hidden");
    if (window.currentExpense) {
      showSummary(window.currentExpense);
    }
  });

  document.getElementById("cancelButton")?.addEventListener("click", function() {
    document.getElementById("confirmDialog")?.classList.add("hidden");
  });

  document.getElementById("confirmButton")?.addEventListener("click", function() {
    if (!window.currentExpense) return;

    const confirmBtn = document.getElementById("confirmButton");
    const cancelBtn = document.getElementById("cancelButton");
    const statusBox = document.getElementById("statusProgress");

    confirmBtn.disabled = true;
    if (cancelBtn) cancelBtn.disabled = true;

    if (statusBox) {
      statusBox.classList.remove("hidden");
      statusBox.style.color = "#1976d2";
      statusBox.textContent = "⏳ Mentés folyamatban...";
    }

    if (selectedReceipts.length === 0) {
      google.script.run
        .withSuccessHandler(function() {
          if (statusBox) {
            statusBox.style.color = "#2e7d32";
            statusBox.textContent = "✅ Mentés kész!";
          }
          setTimeout(finishExpenseSave, 1200);
        })
        .withFailureHandler(function(err) {
          if (statusBox) {
            statusBox.style.color = "#d32f2f";
            statusBox.textContent = "⚠️ Hiba a mentés során: " + err;
          }
          resetConfirmButtons();
        })
        .saveExpense(window.currentExpense, [], null, null);
      return;
    }

    google.script.run
      .withSuccessHandler(function(expenseId) {
        uploadReceiptImages(expenseId, 0, []);
      })
      .withFailureHandler(function(err) {
        if (statusBox) {
          statusBox.style.color = "#d32f2f";
          statusBox.textContent = "⚠️ Hiba az azonosítónál: " + err;
        }
        resetConfirmButtons();
      })
      .getExpenseId(window.currentExpense.costCenter);
  });

  /* 7. Bevétel Mentés gomb */
  document.getElementById("saveIncomeBtn")?.addEventListener("click", function() {
    const date = document.getElementById("incomeDate").value;
    const amount = document.getElementById("incomeAmount").value;
    const purpose = document.getElementById("incomePurpose").value;
    const paymentMethod = document.getElementById("incomePaymentMethod").value;
    const comment = document.getElementById("incomeComment").value;

    if (!date) { alert("⚠️ Kérlek add meg a dátumot!"); return; }
    if (!amount || Number(amount) <= 0) { alert("⚠️ Kérlek adj meg egy érvényes összeget!"); return; }
    if (!purpose) { alert("⚠️ Kérlek válassz befizetés célt!"); return; }
    if (!paymentMethod) { alert("⚠️ Kérlek válassz befizetési módot!"); return; }

    const checkedPayers = [];
    document.querySelectorAll("#payersCheckboxList input[type='checkbox']:checked").forEach(cb => checkedPayers.push(cb.value));

    const otherCb = document.getElementById("cb_other_payer");
    if (otherCb && otherCb.checked) {
      const customName = document.getElementById("customPayerInput").value.trim();
      if (!customName) { alert("⚠️ Kérlek add meg az 'Egyéb' befizető nevét!"); return; }
      checkedPayers.push(customName);
    }

    if (checkedPayers.length === 0) {
      alert("⚠️ Kérlek válassz ki legalább egy befizetőt!");
      return;
    }

    currentIncomeData = { date, amount: Number(amount), purpose, paymentMethod, payers: checkedPayers, comment };
    document.getElementById("payersDropdownPanel")?.classList.add("hidden");

    showIncomeSummary(currentIncomeData);
  });

  document.getElementById("cancelIncomeButton")?.addEventListener("click", () => document.getElementById("incomeConfirmDialog")?.classList.add("hidden"));

  document.getElementById("confirmIncomeButton")?.addEventListener("click", function() {
    if (!currentIncomeData) return;

    const confirmBtn = document.getElementById("confirmIncomeButton");
    const cancelBtn = document.getElementById("cancelIncomeButton");
    const statusBox = document.getElementById("incomeStatusProgress");

    confirmBtn.disabled = true;
    if (cancelBtn) cancelBtn.disabled = true;

    if (statusBox) {
      statusBox.classList.remove("hidden");
      statusBox.style.color = "#1976d2";
      statusBox.textContent = "⏳ Bevétel rögzítése...";
    }

    google.script.run
      .withSuccessHandler(function() {
        if (statusBox) {
          statusBox.style.color = "#2e7d32";
          statusBox.textContent = "✅ Mentés kész!";
        }
        setTimeout(function() {
          document.getElementById("incomeConfirmDialog")?.classList.add("hidden");
          confirmBtn.disabled = false;
          if (cancelBtn) cancelBtn.disabled = false;
          if (statusBox) statusBox.classList.add("hidden");
          resetIncomeForm();
          showScreen("dashboardView");
          loadPayKalDashboard(currentPeriod);
        }, 1200);
      })
      .withFailureHandler(function(err) {
        if (statusBox) {
          statusBox.style.color = "#d32f2f";
          statusBox.textContent = "⚠️ Hiba: " + err;
        }
        confirmBtn.disabled = false;
        if (cancelBtn) cancelBtn.disabled = false;
      })
      .saveIncome(currentIncomeData);
  });

  /* 8. Pénzmozgás Mentése */
  document.getElementById("saveTransferBtn")?.addEventListener("click", function() {
    const date = document.getElementById("transferDate").value;
    const type = document.getElementById("transferType").value;
    const amount = document.getElementById("transferAmount").value;
    const comment = document.getElementById("transferComment").value;

    if (!date) { alert("⚠️ Kérlek add meg a dátumot!"); return; }
    if (!amount || Number(amount) <= 0) { alert("⚠️ Kérlek adj meg egy érvényes összeget!"); return; }

    const transferData = { date, type, amount: Number(amount), comment };
    const saveBtn = document.getElementById("saveTransferBtn");

    saveBtn.disabled = true;

    google.script.run
      .withSuccessHandler(function() {
        setTimeout(function() {
          saveBtn.disabled = false;
          resetTransferForm();
          showScreen("dashboardView");
          loadPayKalDashboard(currentPeriod);
        }, 1000);
      })
      .withFailureHandler(function(err) {
        alert("⚠️ Hiba: " + err);
        saveBtn.disabled = false;
      })
      .saveTransfer(transferData);
  });

});

/* --- KÉPERNYŐ ÉS DASHBOARD NAVIGÁCIÓ --- */

function showScreen(screenId) {
  const screens = ["dashboardView", "expenseScreen", "incomeScreen", "transferScreen"];
  screens.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add("hidden");
  });
  
  const target = document.getElementById(screenId);
  if (target) target.classList.remove("hidden");
}

function loadPayKalDashboard(period) {
  currentPeriod = period;
  google.script.run
    .withSuccessHandler(renderPayKalDashboardUI)
    .withFailureHandler(function(err) {
      console.error("Hiba a Dashboard adatok betöltésekor:", err);
    })
    .getPayKalDashboardData(period);
}

function renderPayKalDashboardUI(data) {
  if (!data) return;
  document.getElementById('totalBalanceDisplay').innerText = formatHUF(data.totalBalance);
  document.getElementById('cashBalanceDisplay').innerText = formatHUF(data.cashBalance);
  document.getElementById('bankBalanceDisplay').innerText = formatHUF(data.bankBalance);

  var total = data.totalBalance;
  var cashPercent = total > 0 ? Math.round((data.cashBalance / total) * 100) : 50;

  document.getElementById('cashBar').style.width = cashPercent + '%';
  document.getElementById('bankBar').style.width = (100 - cashPercent) + '%';

  renderLineChart(data.labels, data.values);
}

function changeTimeFilter(period) {
  var buttons = document.querySelectorAll('.time-btn');
  buttons.forEach(function(btn) { btn.classList.remove('active'); });

  if (window.event && window.event.currentTarget) {
    window.event.currentTarget.classList.add('active');
  }

  loadPayKalDashboard(period);
}

function renderLineChart(labels, values) {
  var canvas = document.getElementById('expenseChart');
  if (!canvas) return;

  var ctx = canvas.getContext('2d');
  if (paykalChart) paykalChart.destroy();

  var gradient = ctx.createLinearGradient(0, 0, 0, 260);
  gradient.addColorStop(0, 'rgba(37, 99, 235, 0.25)');
  gradient.addColorStop(1, 'rgba(37, 99, 235, 0.0)');

  paykalChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Csoport vagyona',
        data: values,
        borderColor: '#2563eb',
        borderWidth: 3,
        fill: true,
        backgroundColor: gradient,
        tension: 0.35,
        pointRadius: 4,
        pointBackgroundColor: '#2563eb'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(context) { return ' ' + formatHUF(context.raw); }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#64748b' } },
        y: {
          grid: { color: '#f1f5f9' },
          ticks: {
            font: { size: 10 },
            color: '#64748b',
            callback: function(v) { return formatHUF(v); }
          }
        }
      }
    }
  });
}

function formatHUF(amount) {
  return Number(amount || 0).toLocaleString('hu-HU') + ' Ft';
}

function loadSettings() {
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) return;
      
      fillSelect("costCenter", data.costCenters, "Válassz költséghelyet");
      fillSelect("paymentMethod", data.paymentMethods, "Válassz fizetési módot");
      fillSelect("incomePaymentMethod", data.incomePaymentMethods, "Válassz módot (Pl. Készpénz / Utalás)");
      fillSelect("incomePurpose", data.incomePurposes, "Válassz célt");

      const payersList = document.getElementById("payersCheckboxList");
      if (payersList && data.payers) {
        payersList.innerHTML = "";
        data.payers.forEach(function(payer) {
          const label = document.createElement("label");
          label.className = "checkbox-item";
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.value = payer;
          cb.addEventListener("change", updatePayerBadge);
          label.appendChild(cb);
          label.appendChild(document.createTextNode(payer));
          payersList.appendChild(label);
        });
      }
    })
    .getSettings();
}

function fillSelect(elementId, items, placeholder) {
  const select = document.getElementById(elementId);
  if (select && items) {
    select.innerHTML = '<option value="" disabled selected>' + placeholder + '</option>';
    items.forEach(item => {
      const option = document.createElement("option");
      option.value = item;
      option.textContent = item;
      select.appendChild(option);
    });
  }
}

function updatePayerBadge() {
  const checkedCount = document.querySelectorAll("#payersCheckboxList input[type='checkbox']:checked").length;
  const otherCb = document.getElementById("cb_other_payer");
  const isOther = otherCb && otherCb.checked ? 1 : 0;
  const total = checkedCount + isOther;

  const triggerText = document.getElementById("payerSelectText");
  if (triggerText) {
    triggerText.textContent = total === 0 ? "Válassz befizető(k)et..." : "Kijelölve: " + total + " fő";
  }
}

function renderReceiptPreviews() {
  const previewContainer = document.getElementById("receiptPreview");
  if (!previewContainer) return;

  if (selectedReceipts.length === 0) {
    previewContainer.innerHTML = "";
    return;
  }

  let html = '<ul style="list-style: none; padding: 0; margin: 10px 0 0 0;">';
  selectedReceipts.forEach((item, idx) => {
    html += `<li style="padding: 4px 0; border-bottom: 1px solid #eee; font-size: 14px;">
      <span><strong>${idx + 1}. kép</strong> -- ${item.name}</span>
      <sup onclick="removeReceipt(${idx})" style="cursor: pointer; color: #888; font-weight: bold; margin-left: 6px; font-size: 13px;" title="Törlés">✕</sup>
    </li>`;
  });
  html += '</ul>';
  previewContainer.innerHTML = html;
}

function removeReceipt(index) {
  selectedReceipts.splice(index, 1);
  renderReceiptPreviews();
}

function showSummary(expense) {
  document.getElementById("summary").innerHTML = 
    "<p><strong>Dátum:</strong> " + expense.date + "</p>" +
    "<p><strong>Összeg:</strong> " + formatHUF(expense.amount) + "</p>" +
    "<p><strong>Költséghely:</strong> " + expense.costCenter + "</p>" +
    "<p><strong>Fizetési mód:</strong> " + expense.paymentMethod + "</p>" +
    "<p><strong>Megjegyzés:</strong> " + (expense.comment || "-") + "</p>" +
    "<p><strong>Csatolt blokkok:</strong> " + selectedReceipts.length + " db</p>";

  const confirmBtn = document.getElementById("confirmButton");
  if (confirmBtn) confirmBtn.style.backgroundColor = "#2e7d32";

  document.getElementById("confirmDialog")?.classList.remove("hidden");
}

function uploadReceiptImages(expenseId, index, uploadedUrls) {
  const statusBox = document.getElementById("statusProgress");
  if (statusBox) {
    statusBox.classList.remove("hidden");
    statusBox.style.color = "#1976d2";
    statusBox.textContent = `⏳ Blokk feltöltése (${index + 1}/${selectedReceipts.length})...`;
  }

  google.script.run
    .withSuccessHandler(function(result) {
      uploadedUrls.push(result.url);
      if (index + 1 < selectedReceipts.length) {
        uploadReceiptImages(expenseId, index + 1, uploadedUrls);
      } else {
        if (statusBox) statusBox.textContent = "⏳ Költség rögzítése...";
        google.script.run
          .withSuccessHandler(function() {
            if (statusBox) {
              statusBox.style.color = "#2e7d32";
              statusBox.textContent = "✅ Mentés kész!";
            }
            setTimeout(finishExpenseSave, 1200);
          })
          .withFailureHandler(function(err) {
            if (statusBox) {
              statusBox.style.color = "#d32f2f";
              statusBox.textContent = "⚠️ Hiba a mentés során: " + err;
            }
            resetConfirmButtons();
          })
          .saveExpense(window.currentExpense, uploadedUrls, expenseId, null);
      }
    })
    .withFailureHandler(function(err) {
      if (statusBox) {
        statusBox.style.color = "#d32f2f";
        statusBox.textContent = "⚠️ Hiba a kép feltöltése során: " + err;
      }
      resetConfirmButtons();
    })
    .uploadExpenseImage(selectedReceipts[index].data, expenseId, index + 1);
}

function finishExpenseSave() {
  document.getElementById("confirmDialog")?.classList.add("hidden");
  resetConfirmButtons();
  resetExpenseForm();
  showScreen("dashboardView");
  loadPayKalDashboard(currentPeriod);
}

function resetConfirmButtons() {
  const confirmBtn = document.getElementById("confirmButton");
  const cancelBtn = document.getElementById("cancelButton");
  const statusBox = document.getElementById("statusProgress");

  if (confirmBtn) confirmBtn.disabled = false;
  if (cancelBtn) cancelBtn.disabled = false;
  if (statusBox) {
    statusBox.classList.add("hidden");
    statusBox.textContent = "";
  }
}

function resetExpenseForm() {
  document.getElementById("amount").value = "";
  document.getElementById("comment").value = "";
  if (document.getElementById("costCenter")) document.getElementById("costCenter").selectedIndex = 0;
  if (document.getElementById("paymentMethod")) document.getElementById("paymentMethod").selectedIndex = 0;
  selectedReceipts = [];
  renderReceiptPreviews();
  const receiptInput = document.getElementById("receipt");
  if (receiptInput) receiptInput.value = "";
}

function showIncomeSummary(income) {
  const totalSum = income.amount * income.payers.length;
  document.getElementById("incomeSummary").innerHTML = 
    "<p><strong>Dátum:</strong> " + income.date + "</p>" +
    "<p><strong>Összeg / fő:</strong> " + formatHUF(income.amount) + "</p>" +
    "<p><strong>Befizetés célja:</strong> " + income.purpose + "</p>" +
    "<p><strong>Befizetés módja:</strong> " + income.paymentMethod + "</p>" +
    "<p><strong>Kijelölt befizetők (" + income.payers.length + " fő):</strong><br><i>" + income.payers.join(", ") + "</i></p>" +
    "<p style='font-size: 18px; color: #2e7d32; margin-top: 10px;'><strong>Összesen rögzítve: " + formatHUF(totalSum) + "</strong></p>";

  const confirmBtn = document.getElementById("confirmIncomeButton");
  if (confirmBtn) confirmBtn.style.backgroundColor = "#2e7d32";

  document.getElementById("incomeConfirmDialog")?.classList.remove("hidden");
}

function resetIncomeForm() {
  document.getElementById("incomeAmount").value = "";
  document.getElementById("incomeComment").value = "";
  if (document.getElementById("incomePurpose")) document.getElementById("incomePurpose").selectedIndex = 0;
  if (document.getElementById("incomePaymentMethod")) document.getElementById("incomePaymentMethod").selectedIndex = 0;
  document.querySelectorAll("#payersCheckboxList input[type='checkbox']").forEach(cb => cb.checked = false);
  if (document.getElementById("cb_other_payer")) document.getElementById("cb_other_payer").checked = false;
  if (document.getElementById("customPayerInput")) document.getElementById("customPayerInput").value = "";
  document.getElementById("customPayerContainer")?.classList.add("hidden");
  document.getElementById("payersDropdownPanel")?.classList.add("hidden");
  updatePayerBadge();
}

function resetTransferForm() {
  document.getElementById("transferAmount").value = "";
  document.getElementById("transferComment").value = "";
  if (document.getElementById("transferType")) document.getElementById("transferType").selectedIndex = 0;
}
</script>
