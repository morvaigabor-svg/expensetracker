<script>
let selectedReceipts = [];
let chartInstance = null;
let currentPeriod = "havi";

document.addEventListener("DOMContentLoaded", function() {

  /* 1. Kezdő adatok és Dashboard betöltése */
  loadDashboardData("havi");
  loadSettings();

  /* 2. Dátum beállítása az űrlapon */
  try {
    const dateField = document.getElementById("date");
    if (dateField) {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      dateField.value = year + "-" + month + "-" + day;
    }
  } catch (e) {
    console.error(e);
  }

  /* 3. Képernyőváltó gombok */
  const addExpenseBtn = document.getElementById("addExpenseBtn");
  if (addExpenseBtn) {
    addExpenseBtn.addEventListener("click", function() {
      showScreen("expenseScreen");
    });
  }

  const backToDashBtn = document.getElementById("backToDashBtn");
  if (backToDashBtn) {
    backToDashBtn.addEventListener("click", function() {
      showScreen("dashboardScreen");
      loadDashboardData(currentPeriod); // Frissítjük a diagramot
    });
  }

  /* 4. Időszak szűrő gombok */
  const filterBtns = document.querySelectorAll(".filter-btn");
  filterBtns.forEach(function(btn) {
    btn.addEventListener("click", function() {
      filterBtns.forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      currentPeriod = this.getAttribute("data-period");
      loadDashboardData(currentPeriod);
    });
  });

  /* 5. Mentés gomb */
  const saveBtn = document.getElementById("saveButton");
  if (saveBtn) {
    saveBtn.addEventListener("click", function() {
      const amount = document.getElementById("amount").value;
      const date = document.getElementById("date").value;
      const costCenter = document.getElementById("costCenter").value;
      const paymentMethod = document.getElementById("paymentMethod").value;
      const comment = document.getElementById("comment").value;

      if (!amount) { alert("Kérlek add meg az összeget!"); return; }
      if (!costCenter) { alert("Kérlek válassz költséghelyet!"); return; }
      if (!paymentMethod) { alert("Kérlek válassz fizetési módot!"); return; }

      const expense = {
        date: date,
        amount: Number(amount),
        costCenter: costCenter,
        paymentMethod: paymentMethod,
        comment: comment
      };

      window.currentExpense = expense;

      if (selectedReceipts.length === 0) {
        document.getElementById("noReceiptDialog").classList.remove("hidden");
      } else {
        showSummary(expense);
      }
    });
  }

  /* Modal gombok */
  document.getElementById("noReceiptBackButton")?.addEventListener("click", function() {
    document.getElementById("noReceiptDialog").classList.add("hidden");
  });

  document.getElementById("noReceiptContinueButton")?.addEventListener("click", function() {
    document.getElementById("noReceiptDialog").classList.add("hidden");
    showSummary(window.currentExpense);
  });

  document.getElementById("confirmButton")?.addEventListener("click", function() {
    startSequentialSave();
  });

  document.getElementById("cancelButton")?.addEventListener("click", function() {
    document.getElementById("confirmDialog").classList.add("hidden");
  });

  /* Blokk fotók */
  const receiptInput = document.getElementById("receipt");
  if (receiptInput) {
    receiptInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (file) {
        selectedReceipts.push(file);
        showReceiptList();
        showReceiptDialog();
      }
    });
  }

  document.getElementById("moreReceiptButton")?.addEventListener("click", function() {
    document.getElementById("receiptDialog").classList.add("hidden");
    document.getElementById("receipt").click();
  });

  document.getElementById("finishReceiptButton")?.addEventListener("click", function() {
    document.getElementById("receiptDialog").classList.add("hidden");
  });

});

/* Képernyő váltás */
function showScreen(screenId) {
  document.getElementById("dashboardScreen").classList.add("hidden");
  document.getElementById("expenseScreen").classList.add("hidden");
  document.getElementById(screenId).classList.remove("hidden");
}

/* Dashboard adatok betöltése és Chart.js rajzolás */
function loadDashboardData(period) {
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) return;

      document.getElementById("totalAmountText").textContent = data.totalAmount.toLocaleString("hu-HU") + " Ft";

      renderChart(data.labels, data.values);
    })
    .withFailureHandler(function(err) {
      console.error("Dashboard betöltési hiba:", err);
    })
    .getDashboardStats(period);
}

/* Oszlopdiagram rajzolása 1.5x-es betűméretekkel */
function renderChart(labels, values) {
  const ctx = document.getElementById("expenseChart").getContext("2d");

  if (chartInstance) {
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Költés (Ft)",
        data: values,
        backgroundColor: "#1976d2",
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: {
          ticks: {
            font: {
              size: 16 // 1.5x-es X tengely betűméret
            }
          }
        },
        y: {
          beginAtZero: true,
          ticks: {
            font: {
              size: 16 // 1.5x-es Y tengely betűméret
            },
            callback: function(value) { return value.toLocaleString("hu-HU") + " Ft"; }
          }
        }
      }
    }
  });
}

function loadSettings() {
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) return;
      
      const costCenterSelect = document.getElementById("costCenter");
      if (costCenterSelect && data.costCenters) {
        costCenterSelect.innerHTML = '<option value="" disabled selected>Válassz költséghelyet</option>';
        data.costCenters.forEach(function(item) {
          const option = document.createElement("option");
          option.value = item;
          option.textContent = item;
          costCenterSelect.appendChild(option);
        });
      }

      const paymentSelect = document.getElementById("paymentMethod");
      if (paymentSelect && data.paymentMethods) {
        paymentSelect.innerHTML = '<option value="" disabled selected>Válassz fizetési módot</option>';
        data.paymentMethods.forEach(function(item) {
          const option = document.createElement("option");
          option.value = item;
          option.textContent = item;
          paymentSelect.appendChild(option);
        });
      }
    })
    .getSettings();
}

function startSequentialSave() {
  const expense = window.currentExpense;
  const confirmBtn = document.getElementById("confirmButton");
  const cancelBtn = document.getElementById("cancelButton");
  const statusBox = document.getElementById("statusProgress");

  confirmBtn.disabled = true;
  cancelBtn.disabled = true;
  statusBox.classList.remove("hidden");
  statusBox.innerHTML = "⏳ GPS és ID lekérése...";

  Promise.all([
    getGPSLocation(),
    runGoogleScript("getExpenseId", expense.costCenter)
  ])
  .then(function(results) {
    const gpsCoords = results[0];
    const expenseId = results[1];

    uploadImagesSequentially(expense, expenseId, gpsCoords, 0, []);
  })
  .catch(function(err) {
    handleSaveError("Előkészítési hiba: " + err, confirmBtn, cancelBtn, statusBox);
  });
}

function uploadImagesSequentially(expense, expenseId, gpsCoords, index, imageUrls) {
  const statusBox = document.getElementById("statusProgress");
  const confirmBtn = document.getElementById("confirmButton");
  const cancelBtn = document.getElementById("cancelButton");

  if (index < selectedReceipts.length) {
    statusBox.innerHTML = "⏳ " + (index + 1) + "/" + selectedReceipts.length + ". kép feltöltése...";
    
    fileToBase64(selectedReceipts[index])
      .then(function(base64Data) {
        google.script.run
          .withSuccessHandler(function(uploadResult) {
            imageUrls.push(uploadResult.url);
            uploadImagesSequentially(expense, expenseId, gpsCoords, index + 1, imageUrls);
          })
          .withFailureHandler(function(err) {
            handleSaveError("Képfeltöltési hiba: " + err, confirmBtn, cancelBtn, statusBox);
          })
          .uploadExpenseImage(base64Data, expenseId, index + 1);
      })
      .catch(function(err) {
        handleSaveError("Képolvasási hiba: " + err, confirmBtn, cancelBtn, statusBox);
      });

  } else {
    statusBox.innerHTML = "⏳ Adatok rögzítése a táblázatban...";
    
    google.script.run
      .withSuccessHandler(function() {
        statusBox.innerHTML = "✅ Mentés kész!";
        setTimeout(function() {
          document.getElementById("confirmDialog").classList.add("hidden");
          statusBox.classList.add("hidden");
          confirmBtn.disabled = false;
          cancelBtn.disabled = false;
          resetForm();
          
          // MENTÉS UTÁN AUTOMATIKUSAN VISSZALÉP A DASHBOARDRA ÉS FRISSÍT
          showScreen("dashboardScreen");
          loadDashboardData(currentPeriod);
        }, 1500);
      })
      .withFailureHandler(function(err) {
        handleSaveError("Sheet mentési hiba: " + err, confirmBtn, cancelBtn, statusBox);
      })
      .saveExpense(expense, imageUrls, expenseId, gpsCoords);
  }
}

function getGPSLocation() {
  return new Promise(function(resolve) {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      function(position) {
        resolve({ lat: position.coords.latitude, lng: position.coords.longitude });
      },
      function() { resolve(null); },
      { timeout: 10000, enableHighAccuracy: false, maximumAge: 60000 }
    );
  });
}

function handleSaveError(msg, confirmBtn, cancelBtn, statusBox) {
  alert("⚠ " + msg);
  statusBox.classList.add("hidden");
  confirmBtn.disabled = false;
  cancelBtn.disabled = false;
}

function runGoogleScript(functionName, ...args) {
  return new Promise(function(resolve, reject) {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)[functionName](...args);
  });
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = function(error) { reject(error); };
    reader.readAsDataURL(file);
  });
}

function showSummary(expense) {
  window.currentExpense = expense;
  const summary = document.getElementById("summary");
  summary.innerHTML = 
    "<p><strong>Dátum:</strong> " + expense.date + "</p>" +
    "<p><strong>Összeg:</strong> " + expense.amount + " Ft</p>" +
    "<p><strong>Költséghely:</strong> " + expense.costCenter + "</p>" +
    "<p><strong>Fizetés:</strong> " + expense.paymentMethod + "</p>" +
    "<p><strong>Megjegyzés:</strong> " + expense.comment + "</p>" +
    "<p><strong>Csatolt fotók:</strong> " + selectedReceipts.length + " db</p>";
  document.getElementById("confirmDialog").classList.remove("hidden");
}

function showReceiptList() {
  const preview = document.getElementById("receiptPreview");
  preview.innerHTML = "";
  selectedReceipts.forEach(function(file, index) {
    const item = document.createElement("p");
    item.textContent = (index + 1) + ". kép: " + file.name;
    preview.appendChild(item);
  });
}

function showReceiptDialog() {
  document.getElementById("receiptDialog").classList.remove("hidden");
}

function resetForm() {
  document.getElementById("amount").value = "";
  document.getElementById("comment").value = "";
  document.getElementById("costCenter").selectedIndex = 0;
  document.getElementById("paymentMethod").selectedIndex = 0;
  document.getElementById("receipt").value = "";
  selectedReceipts = [];
  document.getElementById("receiptPreview").innerHTML = "";
}
</script>
