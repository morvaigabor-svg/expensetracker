<script>
document.addEventListener("DOMContentLoaded", function() {
  // Beállítások betöltése a Google Sheets-ből indításkor
  loadSettings();

  // Mai dátumok beállítása az alapértelmezett mezőkbe
  const today = new Date().toISOString().split('T')[0];
  if (document.getElementById("date")) document.getElementById("date").value = today;
  if (document.getElementById("incomeDate")) document.getElementById("incomeDate").value = today;
  if (document.getElementById("transferDate")) document.getElementById("transferDate").value = today;

  // Navigációs gombok eseményei
  document.getElementById("backToDashBtn")?.addEventListener("click", function() { showScreen("dashboardView"); });
  document.getElementById("backToDashFromIncomeBtn")?.addEventListener("click", function() { showScreen("dashboardView"); });
  document.getElementById("backToDashFromTransferBtn")?.addEventListener("click", function() { showScreen("dashboardView"); });

  // Befizetők egyedi lenyíló paneljének megnyitása / bezárása
  document.getElementById("payerSelectTrigger")?.addEventListener("click", function(e) {
    e.stopPropagation();
    const panel = document.getElementById("payersDropdownPanel");
    if (panel) {
      panel.classList.toggle("hidden");
    }
  });

  // Ha a felhasználó mellékattint, zárjuk be a befizetők paneljét
  document.addEventListener("click", function(e) {
    const panel = document.getElementById("payersDropdownPanel");
    const trigger = document.getElementById("payerSelectTrigger");
    if (panel && !panel.contains(e.target) && trigger && !trigger.contains(e.target)) {
      panel.classList.add("hidden");
    }
  });

  // "Egyéb / Új személy" kiválasztása esetén megjelenő mező
  document.getElementById("cb_other_payer")?.addEventListener("change", function() {
    const container = document.getElementById("customPayerContainer");
    if (container) {
      if (this.checked) {
        container.classList.remove("hidden");
      } else {
        container.classList.add("hidden");
      }
    }
    updatePayerBadge();
  });
});

/**
 * Képernyőváltó függvény
 */
function showScreen(screenId) {
  const screens = ["dashboardView", "expenseScreen", "incomeScreen", "transferScreen"];
  screens.forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.classList.add("hidden");
  });
  
  const target = document.getElementById(screenId);
  if (target) target.classList.remove("hidden");
}

/**
 * Beállítások lekérése a Google Sheets szervertől
 */
function loadSettings() {
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) return;
      
      // Dinamikus opciók feltöltése kizárólag a szerverről érkező tömbökből
      fillSelect("costCenter", data.costCenters, "Válassz költséghelyet");
      fillSelect("paymentMethod", data.paymentMethods, "Válassz fizetési módot");
      fillSelect("incomePurpose", data.incomePurposes, "Válassz célt");
      fillSelect("incomePaymentMethod", data.incomePaymentMethods, "Válassz módot");

      // Befizető személyek checkbox listájának felépítése
      const payersList = document.getElementById("payersCheckboxList");
      if (payersList && Array.isArray(data.payers)) {
        payersList.innerHTML = "";
        
        const cleanPayers = data.payers.flat().filter(function(item) {
          return item !== null && item !== undefined && String(item).trim() !== "";
        });

        cleanPayers.forEach(function(payer) {
          const itemDiv = document.createElement("div");
          itemDiv.className = "checkbox-item";

          const label = document.createElement("label");
          label.style.width = "100%";
          label.style.cursor = "pointer";
          label.style.margin = "0";
          label.style.fontWeight = "normal";

          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.value = payer;
          cb.addEventListener("change", updatePayerBadge);

          label.appendChild(cb);
          label.appendChild(document.createTextNode(" " + payer));
          itemDiv.appendChild(label);
          payersList.appendChild(itemDiv);
        });
      }
    })
    .withFailureHandler(function(err) {
      console.error("Hiba a beállítások betöltésekor:", err);
    })
    .getSettings();
}

/**
 * Segédfüggvény a SELECT elemek feltöltéséhez
 */
function fillSelect(elementId, items, placeholder) {
  const select = document.getElementById(elementId);
  if (!select) return;

  // Meglévő opciók törlése
  select.innerHTML = "";

  // Alapértelmezett, nem kiválasztható opció hozzáadása
  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.disabled = true;
  defaultOption.selected = true;
  defaultOption.textContent = placeholder;
  select.appendChild(defaultOption);

  // Adatok ellenőrzése és tisztítása (2D tömb lapítása + üresek kiszűrése)
  if (Array.isArray(items)) {
    const cleanItems = items.flat().filter(function(item) {
      return item !== null && item !== undefined && String(item).trim() !== "";
    });

    cleanItems.forEach(function(item) {
      const option = document.createElement("option");
      option.value = item;
      option.textContent = item;
      select.appendChild(option);
    });
  }
}

/**
 * Befizetők jelvényének/szövegének frissítése
 */
function updatePayerBadge() {
  const checkedCount = document.querySelectorAll("#payersCheckboxList input[type='checkbox']:checked").length;
  const otherCb = document.getElementById("cb_other_payer");
  const isOther = (otherCb && otherCb.checked) ? 1 : 0;
  const total = checkedCount + isOther;

  const triggerText = document.getElementById("payerSelectText");
  if (triggerText) {
    if (total === 0) {
      triggerText.textContent = "Válassz befizető(k)et...";
    } else {
      triggerText.textContent = "Kijelölve: " + total + " fő";
    }
  }
}
</script>
