<!-- 
  @file dialogs.html
  @description Megerősítő és ellenőrző modal/dialog ablakok a kiadás- és bevételrögzítésekhez.
-->

<!-- 1. BLOKK CSATOLÁSA DIALOG -->
<div id="receiptDialog" class="modal-overlay hidden">
  <div class="modal-content">
    <h3 class="modal-title">📷 Blokk / Számla Csatolása</h3>
    <div id="receiptPreview"></div>
    <div class="modal-actions" style="margin-top: 16px; flex-direction: column;">
      <button type="button" id="moreReceiptButton" class="btn btn-secondary">➕ Még egy kép hozzáadása</button>
      <button type="button" id="finishReceiptButton" class="btn btn-primary">✅ Rendben, kész</button>
    </div>
  </div>
</div>

<!-- 2. BLOKK HIÁNYÁRA FIGYELMEZTETŐ DIALOG -->
<div id="noReceiptDialog" class="modal-overlay hidden">
  <div class="modal-content">
    <h3 class="modal-title" style="color: var(--danger-color);">⚠️ Hiányzó blokk</h3>
    <p style="font-size: 14px; color: var(--secondary-color); margin-bottom: 20px;">
      Nem csatoltál blokkot vagy számlát a kiadáshoz. Biztosan folytatod fotó nélkül?
    </p>
    <div class="modal-actions">
      <button type="button" id="noReceiptBackButton" class="btn btn-secondary">⬅️ Vissza</button>
      <button type="button" id="noReceiptContinueButton" class="btn btn-primary">Folytatás</button>
    </div>
  </div>
</div>

<!-- 3. KIADÁS MEGERŐSÍTŐ MODAL -->
<div id="confirmDialog" class="modal-overlay hidden">
  <div class="modal-content">
    <h3 class="modal-title">💸 Kiadás Rögzítése</h3>
    <div id="summary" class="modal-body"></div>
    <div id="statusProgress" class="status-progress hidden"></div>
    <div class="modal-actions" style="margin-top: 16px;">
      <button type="button" id="cancelButton" class="btn btn-secondary">Mégse</button>
      <button type="button" id="confirmButton" class="btn btn-success">Mentés</button>
    </div>
  </div>
</div>

<!-- 4. BEVÉTEL MEGERŐSÍTŐ MODAL -->
<div id="incomeConfirmDialog" class="modal-overlay hidden">
  <div class="modal-content">
    <h3 class="modal-title">💰 Bevétel Rögzítése</h3>
    <div id="incomeSummary" class="modal-body"></div>
    <div id="incomeStatusProgress" class="status-progress hidden"></div>
    <div class="modal-actions" style="margin-top: 16px;">
      <button type="button" id="cancelIncomeButton" class="btn btn-secondary">Mégse</button>
      <button type="button" id="confirmIncomeButton" class="btn btn-success">Mentés</button>
    </div>
  </div>
</div>
