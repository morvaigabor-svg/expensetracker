<style>
  :root {
    --bg-body: #f1f5f9;
    --text-main: #0f172a;
    --card-bg: #ffffff;
    --card-border: #cbd5e1;
    --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    
    --primary: #2563eb;
    --expense: #dc2626;
    --income: #16a34a;
    --transfer: #0284c7;

    --radius-md: 10px;
    --radius-xl: 18px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-color: var(--bg-body);
    color: var(--text-main);
    padding: 16px;
    line-height: 1.5;
    font-size: 16px;
  }

  .container {
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
  }

  .paykal-header {
    padding: 16px;
    text-align: center;
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
    border-radius: var(--radius-xl);
    margin-bottom: 20px;
  }

  .paykal-header h1 {
    font-size: 32px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 1px;
  }

  .card {
    background: var(--card-bg);
    padding: 20px;
    border-radius: var(--radius-xl);
    border: 1px solid var(--card-border);
    box-shadow: var(--card-shadow);
    margin-bottom: 20px;
  }

  .card h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .balance-card {
    text-align: center;
    background: #ffffff;
    border: 1px solid #bae6fd;
  }

  .balance-label {
    font-size: 14px;
    font-weight: 700;
    color: #0369a1;
    text-transform: uppercase;
  }

  .total-balance-amount {
    font-size: 36px;
    font-weight: 900;
    margin: 8px 0;
  }

  .balance-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }

  .balance-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: var(--radius-md);
    padding: 10px;
  }

  .sub-label {
    font-size: 12px;
    font-weight: 700;
    color: #64748b;
  }

  .sub-amount {
    display: block;
    font-size: 18px;
    font-weight: 800;
  }

  .action-buttons-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }

  .action-btn {
    padding: 14px;
    border-radius: var(--radius-md);
    font-size: 16px;
    font-weight: 700;
    border: none;
    color: white;
    cursor: pointer;
  }

  .btn-income { background: var(--income); }
  .btn-expense { background: var(--expense); }
  .btn-transfer { background: var(--transfer); width: 100%; margin-top: 10px; }

  .btn-back {
    background: #64748b;
    color: white;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 700;
    border-radius: var(--radius-md);
    border: none;
    cursor: pointer;
    margin-bottom: 14px;
  }

  .form-group {
    margin-bottom: 14px;
    position: relative;
  }

  label {
    display: block;
    margin-bottom: 4px;
    font-weight: 700;
    font-size: 15px;
    color: #334155;
  }

  /* NORMÁL, TISZTA INPUT ÉS SELECT MEZŐK */
  input[type="text"],
  input[type="number"],
  input[type="date"],
  select,
  textarea {
    width: 100%;
    padding: 12px;
    background: #ffffff;
    border: 1.5px solid #cbd5e1;
    border-radius: var(--radius-md);
    font-size: 16px;
    color: var(--text-main);
    outline: none;
    position: relative;
    z-index: 1;
  }

  select {
    cursor: pointer;
    background-color: #ffffff;
  }

  /* CUSTOMLIST BEFIZETŐK HISSZÁJA */
  .custom-select-wrapper {
    position: relative;
    width: 100%;
    z-index: 5;
  }

  .custom-select-trigger {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
    border: 1.5px solid #cbd5e1;
    padding: 12px;
    border-radius: var(--radius-md);
    font-size: 16px;
    cursor: pointer;
  }

  .dropdown-panel {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    z-index: 100;
    border: 1.5px solid #cbd5e1;
    border-radius: var(--radius-md);
    background: #ffffff;
    padding: 10px;
    max-height: 220px;
    overflow-y: auto;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    margin-top: 4px;
  }

  .dropdown-panel.hidden {
    display: none !important;
    pointer-events: none !important;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    padding: 8px 4px;
    border-bottom: 1px solid #f1f5f9;
    font-size: 15px;
    cursor: pointer;
  }

  .checkbox-item.border-top {
    border-top: 2px solid #e2e8f0;
    margin-top: 6px;
    padding-top: 10px;
  }

  .checkbox-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin-right: 10px;
  }

  .hidden {
    display: none !important;
  }
</style>
