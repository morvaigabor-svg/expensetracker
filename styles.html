<style>

  }

    margin-top: 6px;
    transition: var(--transition);
  }

    box-sizing: border-box;
    max-height: 75vh;
    overflow-y: auto;
  }

    to { opacity: 1; transform: translate(-50%, 0) scale(1); }

    font-size: 18px;
    font-weight: 800;

  .dialog-actions button:not(.btn-secondary):hover {
